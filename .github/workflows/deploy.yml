name: Deploy Portfolio

on:
  push:
    branches:
      - main  # Or 'master' depending on your repo

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # If you have an NPM/Vite project, include these lines:
      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder where your build files (HTML, JS, WASM) live
          branch: gh-pages
